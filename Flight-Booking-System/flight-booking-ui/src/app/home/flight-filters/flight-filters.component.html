<div class="filter-card">
  <h2>Filters</h2>

  <label>Airline</label>

  <select [(ngModel)]="filters.airline" (ngModelChange)="applyFilters()">
    <option value="">All Airlines</option>

    <option *ngFor="let airline of airlines" [value]="airline.airlineCode">
      {{ airline.airlineName }}
    </option>
  </select>

  <label>Maximum Price</label>

  <input
    type="number"
    [(ngModel)]="filters.maxPrice"
    placeholder="₹ Maximum Price"
    (ngModelChange)="applyFilters()"
  />

  <label>Maximum Price</label>

  <input
    type="range"
    min="0"
    [max]="maxPriceLimit"
    step="50"
    [(ngModel)]="filters.maxPrice"
    (ngModelChange)="applyFilters()"
  />

  <label>Sort By</label>

  <select [(ngModel)]="filters.sortBy" (ngModelChange)="applyFilters()">
    <option value="priceLow">Lowest Price</option>
    <option value="priceHigh">Highest Price</option>
    <option value="departure">Earliest Departure</option>
    <option value="duration">Shortest Duration</option>
  </select>

  <!-- Remove this button once instant filters work -->
  <!-- <button (click)="applyFilters()">Apply Filters</button> -->
</div>
